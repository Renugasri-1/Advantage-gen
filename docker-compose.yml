version: "3"

services:

  mongodb:
    image: mongo:7
    container_name: adv_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: adv_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/advantage-gen-db
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - mongodb

  frontend:
    build: ./studio-ui
    container_name: adv_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: